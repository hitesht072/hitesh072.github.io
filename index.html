<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        #hero {
            background: url('hero-image.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        #projects, #skills, #contact {
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        footer {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
    </header>
    <section id="hero">
        <h2>Welcome to My Portfolio</h2>
        <p>Your description here</p>
    </section>
    <section id="about" class="container">
        <h2>About Me</h2>
        <p>Tell your story here.</p>
    </section>
    <section id="projects" class="container">
        <h2>Projects</h2>
        <p>Overview of your projects here.</p>
    </section>
    <section id="skills" class="container">
        <h2>Skills</h2>
        <p>List your skills here.</p>
    </section>
    <section id="contact" class="container">
        <h2>Contact</h2>
        <p>How to reach you.</p>
    </section>
    <footer>
        <p>© 2026 Hitesh</p>
    </footer>
</body>
</html>
